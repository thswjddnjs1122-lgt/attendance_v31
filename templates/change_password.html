{% extends "base.html" %}

{% block content %}

<h2>비밀번호 변경</h2>

<form method="post">

    <label>현재 비밀번호</label>
    <input type="password" name="current_pw" required>

    <label>새 비밀번호</label>
    <input type="password" name="new_pw" required>

    <button type="submit">
        비밀번호 변경
    </button>

</form>

{% endblock %}
