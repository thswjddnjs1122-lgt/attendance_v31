{% extends 'base.html' %}{% block content %}
<h3>학생 회원가입</h3>
<form method="post">
<div class="grid"><div><label>아이디</label><input name="username" required></div><div><label>비밀번호</label><input name="password" type="password" required></div></div>
<div class="grid"><div><label>학과</label><input name="department" value="건축학과"></div><div><label>학년</label><input name="grade"></div></div>
<div class="grid"><div><label>성명</label><input name="student_name" required></div><div><label>학번</label><input name="student_id"></div></div>
<label>생년월일</label><input name="birth" placeholder="예: 1998.12.01">
<button type="submit">회원가입</button> <a href="/login">로그인으로</a>
</form>
{% endblock %}
